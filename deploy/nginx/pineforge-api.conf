# PineForge API — reverse proxy to uvicorn (127.0.0.1:8000)
# Install: see deploy/COMMANDS.md ("Expose the API with nginx")
#
# Use default_server + server_name _ so every Host header works (public IP,
# domain, curl to 127.0.0.1, etc.). A single IP in server_name can yield 404s
# for other Host values.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
